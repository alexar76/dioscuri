name: Publish npm

# Publishes @alexar76/dioscuri to npmjs.com.
# One-time: add repository secret NPM_TOKEN (granular publish token for @alexar76),
# or configure npm Trusted Publishing (OIDC) for alexar76/dioscuri + this workflow.
#
# Manual: Actions → Publish npm → Run workflow
# Tag:    git tag v0.1.0 && git push origin v0.1.0  (after mirror tag lands on satellite)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
