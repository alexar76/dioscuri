# DIOSCURI CI — typecheck + tests on every push/PR, then a no-push Docker build
# to prove the published image recipe stays green.
name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Coverage badge
        env:
          AICOM_CI_ENFORCE_BADGE_SYNC: "1"
        run: bash scripts/ci_static_badge.sh tests pass

      - name: Dependency audit
        run: npm audit --omit=dev

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image (no push)
        run: docker build --target runtime -t dioscuri:ci .

      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: dioscuri:ci
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1
